name: Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version (for manual publish)
        required: true
        default: '1.0.0'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PACKAGE_PROJECT: Infrastructure.Database.Core/Infrastructure.Database.Core.csproj
  TEST_PROJECT: Infrastructure.Database.Core.Tests/Infrastructure.Database.Core.Tests.csproj
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Package version could not be resolved."
            exit 1
          fi

          echo "Resolved package version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Infrastructure.slnx

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECT }}" --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack "${{ env.PACKAGE_PROJECT }}"
          --configuration Release
          --no-restore
          --output ./artifacts
          /p:Version=${{ env.VERSION }}
          /p:RepositoryUrl=https://github.com/${{ github.repository }}

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER != '' && secrets.NUGET_USER || github.repository_owner }}

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source ${{ env.NUGET_SOURCE }}
          --skip-duplicate

      - name: Publish symbols to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.snupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source ${{ env.NUGET_SOURCE }}
          --skip-duplicate
